# Docker Compose for Plane (Requirements Management)
# Updated with proper environment variables for stable operation

services:
  # PostgreSQL Database für Plane
  plane-db:
    image: postgres:15-alpine
    container_name: plane-db
    environment:
      POSTGRES_DB: plane
      POSTGRES_USER: plane
      POSTGRES_PASSWORD: plane
    volumes:
      - plane-db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plane"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis für Caching
  plane-redis:
    image: redis:7-alpine
    container_name: plane-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Plane Backend API
  plane-api:
    image: makeplane/plane-backend:latest
    container_name: plane-api
    environment:
      # Core
      DEBUG: "0"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080"
      
      # Database & Cache
      DATABASE_URL: postgresql://plane:plane@plane-db:5432/plane
      REDIS_URL: redis://plane-redis:6379/
      
      # Security (CHANGE THIS IN PRODUCTION!)
      SECRET_KEY: "agentic-factory-dev-key-2026-change-in-production"
      
      # Celery (Background Tasks)
      CELERY_BROKER_URL: redis://plane-redis:6379/1
      CELERY_RESULT_BACKEND: redis://plane-redis:6379/2
      
      # Email (Optional - uses console for dev)
      EMAIL_BACKEND: "django.core.mail.backends.console.EmailBackend"
      EMAIL_HOST: "localhost"
      EMAIL_PORT: "1025"
      EMAIL_HOST_USER: ""
      EMAIL_HOST_PASSWORD: ""
      EMAIL_USE_TLS: "false"
      DEFAULT_FROM_EMAIL: "noreply@plane.local"
      
      # Frontend
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
      
      # AWS/S3 (Optional - can use local storage)
      USE_S3: "false"
      
      # Sentry (Error tracking - optional)
      SENTRY_DSN: ""
      
      # Admin credentials (for first login)
      ADMIN_EMAIL: "admin@plane.local"
      ADMIN_PASSWORD: "admin123"
      
      # API Rate limiting
      THROTTLE_ENABLED: "false"
      
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Plane Frontend Web UI
  plane-web:
    image: makeplane/plane-frontend:latest
    container_name: plane-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
      NEXT_PUBLIC_ADMIN_BASE_URL: "http://localhost:8000/admin"
    depends_on:
      - plane-api
    ports:
      - "8080:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # JENKINS - CI/CD Pipeline
  # ==========================================
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      JENKINS_ADMIN_ID: admin
      JENKINS_ADMIN_PASSWORD: agentic-factory
    user: root  # Required for Docker access
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ==========================================
  # MONITORING & OBSERVABILITY
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: agentic-factory
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  plane-db-data:
  jenkins_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: agentic-factory
